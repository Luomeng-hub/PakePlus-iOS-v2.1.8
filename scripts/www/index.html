<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🍅 极简番茄钟 · 网页版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f6e9e0 0%, #f2dfd1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 1rem;
            margin: 0;
        }

        .pomodoro-card {
            background: rgba(255, 245, 235, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(180, 100, 60, 0.25), 0 10px 20px rgba(0,0,0,0.1), inset 0 2px 4px rgba(255,255,255,0.6);
            width: 100%;
            max-width: 560px;
            padding: 2.5rem 1.8rem;
            transition: background 0.3s ease;
            border: 1px solid rgba(255, 220, 200, 0.5);
        }

        /* 根据模式微调卡片氛围 (仅装饰) */
        .pomodoro-card.work-mode {
            background: rgba(255, 235, 225, 0.75);
        }
        .pomodoro-card.break-mode {
            background: rgba(220, 245, 230, 0.75);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1.8rem;
        }

        .header h1 {
            font-size: 2.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #7b4e3a;
            text-shadow: 0 2px 3px rgba(255, 215, 175, 0.8);
        }

        .tomato-icon {
            font-size: 2.4rem;
            filter: drop-shadow(0 4px 4px rgba(200, 80, 50, 0.3));
        }

        .timer-display {
            background: #ffffffc9;
            border-radius: 80px;
            padding: 1rem 0.5rem;
            margin: 1.5rem 0 1.2rem;
            box-shadow: inset 0 8px 12px rgba(160, 100, 60, 0.1), 0 10px 20px rgba(110, 60, 30, 0.15);
            border: 2px solid #ffdac0;
        }

        #minutes, #seconds {
            font-size: 7rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            color: #4a2e22;
            text-shadow: 0 3px 6px #ffba91;
            background: linear-gradient(135deg, #5f3d2e, #3f2a1f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 5px;
        }

        .timer-separator {
            font-size: 6rem;
            font-weight: 600;
            color: #b77f64;
            text-shadow: 0 2px 4px #ffcdb0;
        }

        @media (max-width: 480px) {
            #minutes, #seconds { font-size: 5rem; }
            .timer-separator { font-size: 4.5rem; }
            .pomodoro-card { padding: 1.8rem 1rem; }
        }

        .mode-indicator {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffe8db;
            border-radius: 60px;
            padding: 0.8rem 1.8rem;
            margin: 1.2rem 0 1.8rem;
            border: 1px solid #ffc8a7;
            box-shadow: 0 4px 8px #efc9b3;
        }

        .mode-text {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.8rem;
            font-weight: 500;
            color: #5e3c2c;
        }

        .mode-text span {
            font-size: 2rem;
        }

        .tomato-count {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #ffffffb8;
            padding: 0.3rem 1.2rem 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid #ffb185;
        }

        .tomato-count .count-number {
            font-size: 2rem;
            font-weight: 700;
            color: #c24f1a;
            min-width: 2.2rem;
            text-align: center;
        }

        .reset-count-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0 4px;
            color: #a55a3a;
            transition: transform 0.2s ease;
            line-height: 1;
        }
        .reset-count-btn:hover {
            transform: rotate(30deg) scale(1.1);
            color: #c0392b;
        }

        .button-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin: 2rem 0 0.5rem;
        }

        .btn {
            border: none;
            background: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 550;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 12px rgba(150, 80, 40, 0.2), 0 2px 4px #ffe3d1 inset, 0 -2px 4px #dbb097 inset;
            cursor: pointer;
            transition: all 0.12s ease;
            border: 1px solid #fdcbb0;
            flex: 1 0 auto;
            min-width: 120px;
            color: #3f2a1c;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 8px rgba(100, 50, 20, 0.2), inset 0 2px 6px #b58f72;
        }

        .btn:disabled {
            opacity: 0.5;
            transform: translateY(0);
            box-shadow: 0 4px 8px rgba(100, 60, 30, 0.1);
            pointer-events: none;
            filter: grayscale(0.3);
        }

        .btn-start {
            background: #ff8a5c;
            color: white;
            border-color: #ff6200;
            text-shadow: 0 1px 2px #b14000;
        }

        .btn-pause {
            background: #ffb282;
            color: #402818;
            border-color: #e59662;
        }

        .btn-reset {
            background: #f5d2b8;
            color: #5b3a26;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 1.1rem;
            color: #9b6f56;
            opacity: 0.9;
        }

        /* 眨眼提示 */
        @keyframes softPulse {
            0% { background-color: rgba(255, 235, 225, 0.75); }
            50% { background-color: rgba(255, 200, 170, 0.9); }
            100% { background-color: rgba(255, 235, 225, 0.75); }
        }
        .pulse-notify {
            animation: softPulse 0.6s ease 2;
        }
    </style>
</head>
<body>
    <div class="pomodoro-card work-mode" id="pomodoroCard">
        <div class="header">
            <span class="tomato-icon">🍅</span>
            <h1>番茄钟</h1>
            <span class="tomato-icon">⏳</span>
        </div>

        <!-- 倒计时大屏 -->
        <div class="timer-display">
            <div style="text-align: center;">
                <span id="minutes">25</span><span class="timer-separator">:</span><span id="seconds">00</span>
            </div>
        </div>

        <!-- 模式 + 番茄计数 -->
        <div class="mode-indicator">
            <div class="mode-text" id="modeText">
                <span id="modeIcon">🍅</span>
                <span id="modeLabel">工作</span>
            </div>
            <div class="tomato-count">
                <span style="font-size: 1.8rem;">🍅</span>
                <span class="count-number" id="tomatoCount">0</span>
                <button class="reset-count-btn" id="resetCountBtn" title="重置番茄数">↻</button>
            </div>
        </div>

        <!-- 控制按钮组 -->
        <div class="button-panel">
            <button class="btn btn-start" id="startBtn">▶ 开始</button>
            <button class="btn btn-pause" id="pauseBtn" disabled>⏸️ 暂停</button>
            <button class="btn btn-reset" id="resetBtn">↺ 重置</button>
        </div>

        <div class="footer-note">
            ⏱️ 工作25分钟 · 休息5分钟
        </div>
    </div>

    <script>
        (function() {
            // ----- 常量定义 -----
            const WORK_TIME = 25 * 60;      // 1500秒
            const BREAK_TIME = 5 * 60;       // 300秒

            // ----- DOM 元素 -----
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const modeIconEl = document.getElementById('modeIcon');
            const modeLabelEl = document.getElementById('modeLabel');
            const tomatoCountEl = document.getElementById('tomatoCount');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const resetCountBtn = document.getElementById('resetCountBtn');
            const card = document.getElementById('pomodoroCard');

            // ----- 状态变量 -----
            let mode = 'work';                      // 'work' 或 'break'
            let currentSeconds = WORK_TIME;          // 当前剩余秒数
            let tomatoCount = 0;                     // 完成的番茄数（工作阶段数）
            let timerInterval = null;                 // setInterval 句柄
            let isRunning = false;                    // 计时器是否运行中

            // ----- 辅助函数：格式化 mm:ss -----
            function formatTime(seconds) {
                const mins = Math.floor(Math.max(0, seconds) / 60);
                const secs = Math.floor(Math.max(0, seconds) % 60);
                return {
                    mins: mins.toString().padStart(2, '0'),
                    secs: secs.toString().padStart(2, '0')
                };
            }

            // ----- 更新显示：时间、模式文本、番茄数、卡片样式 -----
            function updateDisplay() {
                const { mins, secs } = formatTime(currentSeconds);
                minutesEl.textContent = mins;
                secondsEl.textContent = secs;

                // 更新模式图标和文字
                if (mode === 'work') {
                    modeIconEl.textContent = '🍅';
                    modeLabelEl.textContent = '工作';
                    card.classList.add('work-mode');
                    card.classList.remove('break-mode');
                } else {
                    modeIconEl.textContent = '😌';
                    modeLabelEl.textContent = '休息';
                    card.classList.add('break-mode');
                    card.classList.remove('work-mode');
                }

                // 更新番茄计数
                tomatoCountEl.textContent = tomatoCount;
            }

            // ----- 更新按钮禁用状态（根据 isRunning）-----
            function updateButtons() {
                startBtn.disabled = isRunning;
                pauseBtn.disabled = !isRunning;
                // 重置按钮永远可用，重置计数按钮永远可用 (不由isRunning控制)
            }

            // ----- 完全停止计时器 (清除interval，isRunning置false) -----
            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                isRunning = false;
                updateButtons();
            }

            // ----- 处理阶段完成（倒计时归零时调用）-----
            function handleComplete() {
                // 先停掉计时器（如果有）
                stopTimer();  // 会置 isRunning = false 并清除interval

                // 根据完成时的模式决定下一阶段 & 是否增加番茄
                if (mode === 'work') {
                    // 工作完成 → 增加番茄数，切换到休息
                    tomatoCount++;
                    tomatoCountEl.textContent = tomatoCount;   // 立即更新显示
                    mode = 'break';
                    currentSeconds = BREAK_TIME;
                } else {
                    // 休息完成 → 切换到工作，不加番茄
                    mode = 'work';
                    currentSeconds = WORK_TIME;
                }

                // 更新界面
                updateDisplay();

                // 添加一个小闪烁，提示阶段切换 (纯视觉)
                card.classList.add('pulse-notify');
                setTimeout(() => {
                    card.classList.remove('pulse-notify');
                }, 1200);
            }

            // ----- 开始计时 -----
            function startTimer() {
                // 如果已经在运行，直接返回（按钮已禁用，但防止手动调用）
                if (isRunning) return;

                // 极特殊情况：如果 currentSeconds 已为0（不应发生，但兜底）
                if (currentSeconds <= 0) {
                    // 直接触发完成逻辑，重新设置时间
                    handleComplete();
                    return;
                }

                // 清除残余定时器（安全）
                if (timerInterval) clearInterval(timerInterval);

                // 设置运行标志
                isRunning = true;
                updateButtons();

                // 启动 interval
                timerInterval = setInterval(() => {
                    // 再次检查running状态（防止意外）
                    if (!isRunning) return;

                    // 剩余秒数减一
                    currentSeconds = currentSeconds - 1;

                    // 更新UI
                    updateDisplay();

                    // 检查是否归零/小于0
                    if (currentSeconds <= 0) {
                        // 先停止计时器（避免重复进入）
                        // 注意：stopTimer 会清interval和isRunning，但我们要调用handleComplete
                        // 直接调用handleComplete，内部会stopTimer并切换模式
                        handleComplete(); 
                    }
                }, 1000);
            }

            // ----- 重置计时器（强制回到工作模式，停止计时，保留番茄数）-----
            function resetTimer() {
                // 不管是否运行，先停止
                stopTimer();

                // 重置为工作模式，时间设为25分钟
                mode = 'work';
                currentSeconds = WORK_TIME;

                // 更新显示
                updateDisplay();
            }

            // ----- 重置番茄计数（归零）-----
            function resetTomatoCount() {
                tomatoCount = 0;
                tomatoCountEl.textContent = tomatoCount;
                // 也可以加个小动画，但省略
            }

            // ----- 暂停功能 (停止计时，保留当前剩余秒数)-----
            function pauseTimer() {
                if (isRunning) {
                    stopTimer();  // 会清除interval，isRunning置false，更新按钮
                }
                // 界面保持当前时间不变
            }

            // ----- 绑定事件监听 -----
            startBtn.addEventListener('click', startTimer);
            pauseBtn.addEventListener('click', pauseTimer);
            resetBtn.addEventListener('click', resetTimer);
            resetCountBtn.addEventListener('click', resetTomatoCount);

            // ----- 初始化显示 -----
            updateDisplay();
            updateButtons();

            // ----- 额外细节：防止移动端点击时产生轮廓，保持美观 -----
            const buttons = document.querySelectorAll('.btn, .reset-count-btn');
            buttons.forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();  // 防止双击缩放干扰（不影响click）
                }, { passive: false });
            });

            // 可选：如果页面可见性变化，不处理，保持简单。
        })();
    </script>
</body>
</html>
